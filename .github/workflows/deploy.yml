name: Deploy to Azure VM

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Debug SSH key
        run: |
          echo "Key file size: $(wc -c < ~/.ssh/deploy_key)"
          echo "Key first line: $(head -1 ~/.ssh/deploy_key)"
          echo "Key last line: $(tail -1 ~/.ssh/deploy_key)"
          echo "Host value length: $(echo -n '${{ secrets.VM_HOST }}' | wc -c)"
          echo "User value length: $(echo -n '${{ secrets.VM_USER }}' | wc -c)"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -vvv ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} "echo connected" 2>&1 | tail -30

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'ENDSSH'
            cd ~/creatr-choice

            # Pull latest code
            git pull origin main

            # Make sure Docker is running
            sudo systemctl start docker

            # Rebuild and restart containers
            docker compose down
            docker compose up --build -d

            # Wait for health check (port 8000)
            echo "Waiting for API to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              sleep 2
            done

            # Show running containers
            docker compose ps

            # Cleanup old images
            docker image prune -f
          ENDSSH

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh/deploy_key
